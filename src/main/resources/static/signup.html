<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초간단 회원가입</title>
    <style>
        /* CSS는 길어서 생략하지 않고 기본 뼈대만 최소한으로 남길게 */
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; }
        .container { background: white; padding: 40px; border-radius: 10px; width: 300px; text-align: center; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>회원가입</h2>
    <input type="text" id="loginId" placeholder="아이디">
    <input type="password" id="password" placeholder="비밀번호">
    <input type="text" id="name" placeholder="이름">
    <button onclick="sendData()">가입하기</button>
</div>

<script>
    function sendData() {
        const reqData = {
            loginId: document.getElementById('loginId').value,
            password: document.getElementById('password').value,
            name: document.getElementById('name').value
        };

        fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(reqData)
        })
        .then(async response => {
            const text = await response.text();
            if (response.ok) {
                alert("🎉 성공: " + text);
                // 🌟 확인 버튼을 누르면 로그인 페이지로 즉시 이동!
                window.location.href = '/login.html';
            } else {
                alert("🚨 실패: " + text);
            }
        });
    }
</script>
</body>
</html>
